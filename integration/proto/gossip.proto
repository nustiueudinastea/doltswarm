syntax = "proto3";

option go_package = "./proto";

package proto;

import "proto/hlc.proto";

message RepoId {
  string org = 1;
  string repo_name = 2;
}

// CommitAdV1 is the gossip payload for a commit advertisement.
message CommitAdV1 {
  RepoId repo = 1;
  HLCTimestamp hlc = 2;
  bytes metadata_json = 3;
  bytes metadata_sig = 4;
}

// HeartbeatV1 is a periodic liveness message carrying the sender's current HLC.
message HeartbeatV1 {
  RepoId repo = 1;
  HLCTimestamp hlc = 2;
  string peer_id = 3;
}

// GossipMessage is the envelope published on the gossip topic.
message GossipMessage {
  oneof msg {
    CommitAdV1 commit_ad = 1;
    HeartbeatV1 heartbeat = 3;
  }
}
